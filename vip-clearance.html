<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>寰宇VIP快速通關</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="back">‹</div>
      <div class="title">寰宇VIP快速通關</div>
      <div></div>
    </header>

    <form id="vipClearanceForm">

      <section>
        <h2>服務介紹</h2>
        <div class="info-block">
          喜程專車提供【寰宇VIP快速通關】服務<br>
          ✔ 商務出行首選<br>
          ✔ 快速通關，準時抵達<br>
          讓您省去排隊時間，輕鬆尊榮出境 ✈️
        </div>
      </section>

      <section>
        <h2>預約資訊</h2>

        <div class="field">
          <label>日期</label>
          <input type="date" name="date" required />
        </div>

        <div class="field">
          <label>時間</label>
          <input type="time" name="time" required />
        </div>

        <div class="field">
          <label>航班</label>
          <input type="text" name="flightNo" placeholder="例如 BR169" required />
        </div>

        <div class="field">
          <label>護照姓名</label>
          <input type="text" name="passportName" placeholder="中英文護照姓名" required />
        </div>

        <div class="field">
          <label>出生年月日</label>
          <input type="date" name="birthday" required />
        </div>

        <div class="field">
          <label>護照號碼</label>
          <input type="text" name="passportNo" required />
        </div>
      </section>

      <section>
        <div class="info-block" style="font-size:15px;color:#555;">
          請一併提供護照個人資料頁照片，以利作業，收到資料後，我們將盡快為您安排，謝謝您 😊
        </div>
      </section>

      <button type="submit">送出預約</button>

    </form>
  </div>

  <script>
    const LIFF_ID = "2009891004-ICB0ThxL";

    async function initLiff() {
      await liff.init({ liffId: LIFF_ID });

      if (!liff.isLoggedIn()) {
        liff.login();
      }
    }

    initLiff();

    document.getElementById("vipClearanceForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const formData = new FormData(e.target);

      const message =
`✈️ 寰宇VIP快速通關預約

📅 日期：${formData.get("date")}
⏰ 時間：${formData.get("time")}
✈️ 航班：${formData.get("flightNo")}

👤 護照姓名：${formData.get("passportName")}
🎂 出生年月日：${formData.get("birthday")}
🛂 護照號碼：${formData.get("passportNo")}

請一併提供護照個人資料頁照片，以利作業，收到資料後，我們將盡快為您安排，謝謝您 😊`;

      try {
        await liff.sendMessages([
          {
            type: "text",
            text: message
          }
        ]);

        liff.closeWindow();

      } catch (err) {
        alert("請從LINE內開啟");
      }
    });
  </script>

</body>
</html>
