<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>機場接送預約</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
  <div class="app">
    <header class="header">
      <div class="back">‹</div>
      <div class="title">機場接送預約</div>
      <div></div>
    </header>

    <form id="transferForm">

      <section>
        <h2>基本資訊</h2>

        <div class="field">
          <label>姓名</label>
          <input type="text" name="name" required />
        </div>

        <div class="field">
          <label>聯絡電話</label>
          <input type="tel" name="phone" required />
        </div>
      </section>

      <section>
        <h2>行程資訊</h2>

        <div class="field">
          <label>服務類型</label>
          <div class="radio-group">
            <label><input type="radio" name="serviceType" value="接機" checked /> 接機</label>
            <label><input type="radio" name="serviceType" value="送機" /> 送機</label>
            <label><input type="radio" name="serviceType" value="包車" /> 包車</label>
          </div>
        </div>

        <div class="field">
          <label>日期</label>
          <input type="date" name="date" required />
        </div>

        <div class="field">
          <label>時間</label>
          <input type="time" name="time" required />
        </div>

        <div class="field">
          <label>航班號碼</label>
          <input type="text" name="flightNo" />
        </div>

        <div class="field">
          <label>上下車地點</label>
          <input type="text" name="location" required />
        </div>

        <div class="field">
          <label>車種</label>
          <select name="carType">
            <option value="小車">小車</option>
            <option value="進口車">進口車</option>
            <option value="大車">大車</option>
          </select>
        </div>
      </section>

      <section>
        <h2>其他資訊</h2>

        <div class="field">
          <label>人數</label>
          <input type="number" name="passengers" min="1" placeholder="請輸入人數" required />
        </div>

        <div class="field">
          <label>行李數</label>
          <input type="number" name="luggage" min="0" placeholder="請輸入行李數" required />
        </div>

        <div class="field textarea-field">
          <label>備註</label>
          <textarea name="note"></textarea>
        </div>
      </section>

      <button type="submit">送出預約</button>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
